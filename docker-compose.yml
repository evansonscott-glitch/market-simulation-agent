version: "3.8"

services:
  # Slack Bot (default)
  slack-bot:
    build: .
    container_name: market-simulator-slack
    restart: unless-stopped
    environment:
      - INTERFACE=slack
    env_file:
      - .env
    volumes:
      - ./output:/app/output
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

